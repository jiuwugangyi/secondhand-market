<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闲置集市 - 让闲置流动起来</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand"><span>🛍️</span> 闲置集市</a>
    <form class="search-bar" id="searchForm">
      <input type="text" id="searchInput" placeholder="搜索你想要的宝贝...">
      <button type="submit">🔍</button>
    </form>
    <div class="navbar-actions"></div>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>让闲置流动起来 ✨</h1>
  <p>发现好物，出售闲置，让每件物品都找到新主人</p>
  <form class="hero-search" id="heroSearchForm">
    <input type="text" id="heroSearchInput" placeholder="搜索手机、书籍、家电...">
    <button type="submit">搜索</button>
  </form>
  <div class="hero-stats">
    <div class="hero-stat"><div class="num" id="productCount">0</div><div class="label">件商品</div></div>
    <div class="hero-stat"><div class="num">100%</div><div class="label">安全交易</div></div>
    <div class="hero-stat"><div class="num">0</div><div class="label">手续费</div></div>
  </div>
</section>

<!-- 分类 -->
<div class="categories">
  <div class="categories-inner">
    <button class="cat-btn active" data-cat="all">🏠 全部</button>
    <button class="cat-btn" data-cat="电子数码">📱 电子数码</button>
    <button class="cat-btn" data-cat="服装鞋帽">👗 服装鞋帽</button>
    <button class="cat-btn" data-cat="图书教材">📚 图书教材</button>
    <button class="cat-btn" data-cat="家居生活">🏡 家居生活</button>
    <button class="cat-btn" data-cat="运动户外">⚽ 运动户外</button>
    <button class="cat-btn" data-cat="美妆护肤">💄 美妆护肤</button>
    <button class="cat-btn" data-cat="玩具游戏">🎮 玩具游戏</button>
    <button class="cat-btn" data-cat="其他">📦 其他</button>
  </div>
</div>

<!-- 商品列表 -->
<div class="container">
  <div class="section">
    <div class="section-header">
      <h2 class="section-title">最新闲置</h2>
      <div class="sort-bar">
        <span style="font-size:13px;color:var(--text-light)">排序：</span>
        <button class="sort-btn active" data-sort="newest">最新</button>
        <button class="sort-btn" data-sort="price_asc">价格↑</button>
        <button class="sort-btn" data-sort="price_desc">价格↓</button>
        <button class="sort-btn" data-sort="popular">最热</button>
      </div>
    </div>
    <div class="product-grid"></div>
    <div class="pagination"></div>
  </div>
</div>

<!-- 登录弹窗 -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">欢迎回来 👋</h3>
      <button class="modal-close" onclick="closeModal('loginModal')">×</button>
    </div>
    <div class="modal-body">
      <form id="loginForm">
        <div class="form-group">
          <label class="form-label">用户名 <span class="required">*</span></label>
          <input name="username" class="form-control" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码 <span class="required">*</span></label>
          <input name="password" type="password" class="form-control" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">登录</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--text-light)">
        还没有账号？<a href="#" onclick="closeModal('loginModal');openRegisterModal()" style="color:var(--primary)">立即注册</a>
      </p>
    </div>
  </div>
</div>

<!-- 注册弹窗 -->
<div class="modal-overlay" id="registerModal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title">创建账号 🎉</h3>
      <button class="modal-close" onclick="closeModal('registerModal')">×</button>
    </div>
    <div class="modal-body">
      <form id="registerForm">
        <div class="form-group">
          <label class="form-label">用户名 <span class="required">*</span></label>
          <input name="username" class="form-control" placeholder="2-20个字符" required>
        </div>
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input name="phone" class="form-control" placeholder="方便买家联系你（可选）">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">密码 <span class="required">*</span></label>
            <input name="password" type="password" class="form-control" placeholder="至少6位" required>
          </div>
          <div class="form-group">
            <label class="form-label">确认密码 <span class="required">*</span></label>
            <input name="password2" type="password" class="form-control" placeholder="再次输入密码" required>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">注册</button>
      </form>
      <p style="text-align:center;margin-top:16px;font-size:14px;color:var(--text-light)">
        已有账号？<a href="#" onclick="closeModal('registerModal');openLoginModal()" style="color:var(--primary)">立即登录</a>
      </p>
    </div>
  </div>
</div>

<!-- 发布商品弹窗 -->
<div class="modal-overlay" id="postModal">
  <div class="modal modal-lg">
    <div class="modal-header">
      <h3 class="modal-title">发布闲置 📷</h3>
      <button class="modal-close" onclick="closeModal('postModal')">×</button>
    </div>
    <div class="modal-body">
      <form id="postForm" enctype="multipart/form-data">
        <div class="form-group">
          <label class="form-label">商品图片</label>
          <div class="img-upload-area">
            <div class="icon">📸</div>
            <p>点击或拖拽上传图片（最多6张）</p>
          </div>
          <div class="img-preview-grid"></div>
          <input type="file" id="imageInput" accept="image/*" multiple style="display:none">
        </div>
        <div class="form-group">
          <label class="form-label">商品标题 <span class="required">*</span></label>
          <input name="title" class="form-control" placeholder="简洁描述你的商品，如：iPhone 14 Pro 256G 深空黑" required>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">价格 <span class="required">*</span></label>
            <input name="price" type="number" min="0" step="0.01" class="form-control" placeholder="0.00" required>
          </div>
          <div class="form-group">
            <label class="form-label">成色 <span class="required">*</span></label>
            <select name="condition" class="form-control" required>
              <option value="">请选择</option>
              <option value="全新">全新（未拆封）</option>
              <option value="99新">99新（几乎全新）</option>
              <option value="良好">良好（轻微使用痕迹）</option>
              <option value="一般">一般（明显使用痕迹）</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">分类 <span class="required">*</span></label>
            <select name="category" class="form-control" required>
              <option value="">请选择</option>
              <option value="电子数码">电子数码</option>
              <option value="服装鞋帽">服装鞋帽</option>
              <option value="图书教材">图书教材</option>
              <option value="家居生活">家居生活</option>
              <option value="运动户外">运动户外</option>
              <option value="美妆护肤">美妆护肤</option>
              <option value="玩具游戏">玩具游戏</option>
              <option value="其他">其他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">所在地</label>
            <input name="location" class="form-control" placeholder="如：北京市朝阳区">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">商品描述</label>
          <textarea name="description" class="form-control" placeholder="详细描述商品状态、购买时间、附件等信息..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">🚀 立即发布</button>
      </form>
    </div>
  </div>
</div>

<footer>
  <p>© 2024 闲置集市 · 让每件物品都找到新主人 ❤️</p>
</footer>

<script src="/js/app.js"></script>
<script>
  // 处理 URL 搜索参数
  const urlParams = new URLSearchParams(location.search);
  const searchKw = urlParams.get('search');
  if (searchKw) {
    currentKeyword = searchKw;
    document.getElementById('searchInput').value = searchKw;
  }
</script>
</body>
</html>
