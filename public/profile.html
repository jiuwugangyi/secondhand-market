<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>个人中心 - 闲置集市</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand"><span>🛍️</span> 闲置集市</a>
    <form class="search-bar" id="searchForm">
      <input type="text" id="searchInput" placeholder="搜索商品...">
      <button type="submit">🔍</button>
    </form>
    <div class="navbar-actions"></div>
  </div>
</nav>

<div class="profile-header" id="profileHeader">
  <div class="profile-header-inner">
    <div class="profile-avatar-wrap" title="点击更换头像">
      <img src="/img/default-avatar.png" class="profile-avatar" id="profileAvatar">
      <div class="avatar-upload-overlay" id="avatarOverlay">📷</div>
      <input type="file" id="avatarInput" accept="image/*" style="display:none">
    </div>
    <div style="flex:1">
      <div class="profile-name" id="profileName">加载中...</div>
      <div class="profile-bio" id="profileBio"></div>
      <div id="creditBadge" style="margin-top:6px"></div>
      <div class="profile-stats">
        <div class="profile-stat"><div class="num" id="statProducts">0</div><div class="label">发布</div></div>
        <div class="profile-stat"><div class="num" id="statFavorites">0</div><div class="label">收藏</div></div>
        <div class="profile-stat"><div class="num" id="statSold">0</div><div class="label">已售</div></div>
      </div>
    </div>
    <div id="profileActions"></div>
  </div>
</div>

<div class="container">
  <div class="section">
    <div class="tabs" id="tabs">
      <button class="tab-btn active" data-tab="products" onclick="switchTab('products')">📦 我的发布</button>
      <button class="tab-btn" data-tab="favorites" onclick="switchTab('favorites')">❤️ 我的收藏</button>
      <button class="tab-btn" data-tab="messages" onclick="switchTab('messages')">💬 消息</button>
      <button class="tab-btn" data-tab="settings" onclick="switchTab('settings')">⚙️ 设置</button>
    </div>

    <!-- 我的发布 -->
    <div class="tab-content active" id="tab-products">
      <div class="status-tabs">
        <button class="status-tab active" data-status="all" onclick="switchStatusTab('all')">全部</button>
        <button class="status-tab" data-status="active" onclick="switchStatusTab('active')">在售</button>
        <button class="status-tab" data-status="reserved" onclick="switchStatusTab('reserved')">已预订</button>
        <button class="status-tab" data-status="sold" onclick="switchStatusTab('sold')">已售出</button>
      </div>
      <div id="myProducts"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- 我的收藏 -->
    <div class="tab-content" id="tab-favorites">
      <div id="myFavorites"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- 消息 -->
    <div class="tab-content" id="tab-messages">
      <div id="myMessages"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <!-- 设置 -->
    <div class="tab-content" id="tab-settings">
      <div style="max-width:480px">
        <form id="settingsForm">
          <div class="form-group">
            <label class="form-label">用户名</label>
            <input class="form-control" id="settingsUsername" disabled style="background:var(--bg)">
            <div class="form-hint">用户名暂不支持修改</div>
          </div>
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input name="phone" id="settingsPhone" class="form-control" placeholder="方便买家联系">
          </div>
          <div class="form-group">
            <label class="form-label">个人简介</label>
            <textarea name="bio" id="settingsBio" class="form-control" placeholder="介绍一下自己..."></textarea>
          </div>
          <div style="display:flex;gap:10px">
            <button type="submit" class="btn btn-primary">保存修改</button>
            <button type="button" class="btn btn-danger btn-outline" onclick="confirmLogout()">退出登录</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- 底部导航 -->
<nav class="bottom-nav">
  <a href="/" class="bottom-nav-item"><span class="bottom-nav-icon">🏠</span><span>首页</span></a>
  <a href="#" class="bottom-nav-item"><span class="bottom-nav-icon">🔍</span><span>搜索</span></a>
  <a href="/" class="bottom-nav-item bottom-nav-publish" onclick="openPostModal();return false"><span class="bottom-nav-icon">＋</span></a>
  <a href="#" class="bottom-nav-item" onclick="switchTab('messages');return false"><span class="bottom-nav-icon">💬</span><span>消息</span></a>
  <a href="/profile.html" class="bottom-nav-item active"><span class="bottom-nav-icon">👤</span><span>我的</span></a>
</nav>

<footer class="site-footer">
  <div class="container"><div class="footer-bottom"><p>© 2024 闲置集市</p></div></div>
</footer>

<script src="/js/app.js"></script>
<script>
let profileUserId = null; // 查看的用户ID（null=自己）
let isOwnProfile = true;
let currentStatusFilter = 'all';

// 信用等级
function getCreditLevel(count) {
  if (count >= 50) return { label: '金牌卖家', color: '#FFD700', icon: '🏆' };
  if (count >= 20) return { label: '优质卖家', color: '#FF6B35', icon: '⭐' };
  if (count >= 5)  return { label: '普通用户', color: '#28A745', icon: '✅' };
  return { label: '新手用户', color: '#6C757D', icon: '🌱' };
}

async function loadProfile() {
  try {
    const url = profileUserId ? `/api/users/${profileUserId}` : '/api/me';
    const user = await api.get(url);
    profileUserId = user.id;

    document.title = `${user.username} - 闲置集市`;
    document.getElementById('profileName').textContent = user.username;
    document.getElementById('profileBio').textContent = user.bio || '这个人很懒，什么都没写~';
    document.getElementById('profileAvatar').src = user.avatar || '/img/default-avatar.png';
    if (document.getElementById('settingsUsername')) {
      document.getElementById('settingsUsername').value = user.username;
    }
    if (document.getElementById('settingsPhone')) document.getElementById('settingsPhone').value = user.phone || '';
    if (document.getElementById('settingsBio')) document.getElementById('settingsBio').value = user.bio || '';

    // 加载统计
    const products = await api.get(isOwnProfile ? '/api/my/products' : `/api/products?limit=100&status=active`);
    const productList = isOwnProfile ? products : products.products;
    const total = productList.length;
    const sold = isOwnProfile ? productList.filter(p => p.status === 'sold').length : 0;
    document.getElementById('statProducts').textContent = total;
    document.getElementById('statSold').textContent = sold;

    // 信用等级
    const credit = getCreditLevel(total);
    document.getElementById('creditBadge').innerHTML = `
      <span style="background:${credit.color}22;color:${credit.color};padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700">
        ${credit.icon} ${credit.label}
      </span>`;

    // 收藏数
    if (isOwnProfile) {
      const favs = await api.get('/api/my/favorites');
      document.getElementById('statFavorites').textContent = favs.length;
    }

    // 头像上传（仅自己）
    if (isOwnProfile) {
      const wrap = document.querySelector('.profile-avatar-wrap');
      const overlay = document.getElementById('avatarOverlay');
      const input = document.getElementById('avatarInput');
      if (wrap && overlay) {
        wrap.style.cursor = 'pointer';
        overlay.style.display = 'flex';
        wrap.onclick = () => input.click();
        input.onchange = async () => {
          if (!input.files[0]) return;
          const fd = new FormData();
          fd.append('avatar', input.files[0]);
          try {
            const r = await api.upload('/api/me/avatar', fd);
            document.getElementById('profileAvatar').src = r.avatar;
            const navAv = document.getElementById('navAvatar');
            if (navAv) navAv.src = r.avatar;
            showToast('头像已更新', 'success');
          } catch (e) { showToast(e.message, 'error'); }
        };
      }
    } else {
      // 查看他人主页：隐藏头像上传
      const overlay = document.getElementById('avatarOverlay');
      if (overlay) overlay.style.display = 'none';
      // 隐藏私有 Tab
      document.querySelector('[data-tab=favorites]').style.display = 'none';
      document.querySelector('[data-tab=messages]').style.display = 'none';
      document.querySelector('[data-tab=settings]').style.display = 'none';
      // 显示联系按钮
      document.getElementById('profileActions').innerHTML = `
        <a href="/" class="btn btn-primary btn-sm">💬 发消息</a>`;
    }
  } catch (e) {
    if (!isOwnProfile) {
      showToast('用户不存在', 'error');
      setTimeout(() => location.href = '/', 1000);
    } else {
      showToast('请先登录', 'warning');
      setTimeout(() => location.href = '/', 800);
    }
  }
}

function switchTab(name) {
  $$('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  $$('.tab-content').forEach(c => c.classList.remove('active'));
  document.getElementById('tab-' + name)?.classList.add('active');
  // 更新 URL hash
  history.replaceState(null, '', `?${profileUserId && !isOwnProfile ? 'id='+profileUserId+'&' : ''}tab=${name}`);
  if (name === 'products') loadMyProducts();
  if (name === 'favorites') loadMyFavorites();
  if (name === 'messages') loadMyMessages();
}

function switchStatusTab(status) {
  currentStatusFilter = status;
  $$('.status-tab').forEach(b => b.classList.toggle('active', b.dataset.status === status));
  loadMyProducts();
}

async function loadMyProducts() {
  const el = document.getElementById('myProducts');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const url = isOwnProfile
      ? `/api/my/products${currentStatusFilter !== 'all' ? '?status=' + currentStatusFilter : ''}`
      : `/api/products?limit=50&status=active`;
    const data = await api.get(url);
    const products = isOwnProfile ? data : data.products;
    document.getElementById('statProducts').textContent = products.length;
    if (!products.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">📦</div><h3>暂无商品</h3>
        ${isOwnProfile ? `<p><button class="btn btn-primary" onclick="openPostModal()">发布第一件闲置</button></p>` : ''}
      </div>`;
      return;
    }
    el.innerHTML = `<div class="product-grid">${products.map(p => `
      <div class="product-card" onclick="location.href='/product.html?id=${p.id}'">
        ${p.images?.[0] ? `<img src="${p.images[0]}" class="product-img" loading="lazy">` : `<div class="product-img-placeholder">📷</div>`}
        ${p.status !== 'active' ? `<span class="status-badge status-${p.status}">${p.status==='sold'?'已售出':'已预订'}</span>` : ''}
        <div class="product-info">
          <div class="product-title">${p.title}</div>
          <div class="product-price">${formatPrice(p.price)}</div>
          <div class="product-meta">
            <span>${p.condition}</span>
            <span>${formatTime(p.created_at)}</span>
          </div>
          ${isOwnProfile ? `
          <div style="display:flex;gap:6px;margin-top:8px">
            <button class="btn btn-sm btn-outline" onclick="event.stopPropagation();location.href='/product.html?id=${p.id}'">编辑</button>
            <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();quickDelete(${p.id},this)">删除</button>
          </div>` : ''}
        </div>
      </div>
    `).join('')}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>${e.message}</h3></div>`;
  }
}

async function quickDelete(id, btn) {
  if (!confirm('确定删除这件商品吗？')) return;
  try {
    await api.delete(`/api/products/${id}`);
    showToast('已删除', 'success');
    loadMyProducts();
  } catch (e) { showToast(e.message, 'error'); }
}

async function loadMyFavorites() {
  const el = document.getElementById('myFavorites');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const products = await api.get('/api/my/favorites');
    document.getElementById('statFavorites').textContent = products.length;
    if (!products.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">❤️</div><h3>还没有收藏</h3>
        <p><a href="/" class="btn btn-primary" style="margin-top:8px">去发现好物</a></p></div>`;
      return;
    }
    el.innerHTML = `<div class="product-grid">${products.map(p => `
      <div class="product-card" onclick="location.href='/product.html?id=${p.id}'">
        ${p.images?.[0] ? `<img src="${p.images[0]}" class="product-img" loading="lazy">` : `<div class="product-img-placeholder">📷</div>`}
        <div class="product-info">
          <div class="product-title">${p.title}</div>
          <div class="product-price">${formatPrice(p.price)}</div>
          <div class="product-meta">
            <span onclick="event.stopPropagation();location.href='/profile.html?id=${p.user_id}'" style="cursor:pointer;color:var(--primary)">${p.username}</span>
            <span>${p.condition}</span>
          </div>
        </div>
      </div>
    `).join('')}</div>`;
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>${e.message}</h3></div>`;
  }
}

async function loadMyMessages() {
  const el = document.getElementById('myMessages');
  el.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
  try {
    const msgs = await api.get('/api/my/messages');
    if (!msgs.length) {
      el.innerHTML = `<div class="empty-state"><div class="icon">💬</div><h3>暂无消息</h3>
        <p><a href="/" class="btn btn-primary" style="margin-top:8px">去逛逛</a></p></div>`;
      return;
    }
    el.innerHTML = msgs.map(m => `
      <div class="msg-item" onclick="location.href='/product.html?id=${m.product_id}'">
        <img src="${m.other_avatar || '/img/default-avatar.png'}" class="msg-avatar" loading="lazy">
        <div class="msg-body">
          <div class="msg-name">${m.other_username}
            ${!m.is_read && m.receiver_id === currentUser?.userId ? `<span class="badge">新</span>` : ''}
          </div>
          <div class="msg-preview">${m.content}</div>
          <div class="msg-product">📦 ${m.product_title}</div>
        </div>
        <div class="msg-time">${formatTime(m.created_at)}</div>
      </div>
    `).join('');
  } catch (e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><h3>${e.message}</h3></div>`;
  }
}

function confirmLogout() {
  if (confirm('确定要退出登录吗？')) logout();
}

document.getElementById('settingsForm')?.addEventListener('submit', async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const btn = e.target.querySelector('[type=submit]');
  btn.disabled = true; btn.textContent = '保存中...';
  try {
    await api.put('/api/me', { phone: fd.get('phone'), bio: fd.get('bio') });
    showToast('保存成功 ✅', 'success');
    loadProfile();
  } catch (e) { showToast(e.message, 'error'); }
  finally { btn.disabled = false; btn.textContent = '保存修改'; }
});

document.addEventListener('DOMContentLoaded', async () => {
  // 解析 URL 参数
  const params = new URLSearchParams(location.search);
  const uid = params.get('id');
  const tab = params.get('tab') || 'products';

  await checkSession();

  if (uid) {
    profileUserId = parseInt(uid);
    isOwnProfile = currentUser && currentUser.userId === profileUserId;
  } else {
    if (!currentUser) { location.href = '/'; return; }
    isOwnProfile = true;
  }

  await loadProfile();

  // 切换到指定 Tab
  switchTab(tab);

  // 搜索跳转
  document.getElementById('searchForm')?.addEventListener('submit', e => {
    e.preventDefault();
    const kw = document.getElementById('searchInput').value.trim();
    if (kw) location.href = '/?search=' + encodeURIComponent(kw);
  });

  // 关闭弹窗
  $$('.modal-overlay').forEach(m => {
    m.addEventListener('click', e => { if (e.target === m) m.classList.remove('show'); });
  });
});
</script>
</body>
</html>
